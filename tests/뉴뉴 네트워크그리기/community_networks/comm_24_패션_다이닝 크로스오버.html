                  var options = {"physics": {"forceAtlas2Based": {"gravitationalConstant": -80, "centralGravity": 0.01, "springLength": 80, "springConstant": 0.1, "damping": 0.5, "avoidOverlap": 0.8}, "maxVelocity": 50, "minVelocity": 0.5, "solver": "forceAtlas2Based", "stabilization": {"enabled": true, "iterations": 200, "fit": true}}, "nodes": {"shape": "dot", "font": {"size": 13, "face": "AppleSDGothicNeo,MalgunGothic,sans-serif"}, "borderWidthSelected": 4}, "edges": {"smooth": {"enabled": true, "type": "continuous"}}, "interaction": {"hover": true, "tooltipDelay": 100, "hideEdgesOnDrag": true, "navigationButtons": true, "keyboard": true}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  
                      network.on("stabilizationProgress", function(params) {
                          document.getElementById('loadingBar').removeAttribute("style");
                          var maxWidth = 496;
                          var minWidth = 20;
                          var widthFactor = params.iterations/params.total;
                          var width = Math.max(minWidth,maxWidth * widthFactor);
                          document.getElementById('bar').style.width = width + 'px';
                          document.getElementById('text').innerHTML = Math.round(widthFactor*100) + '%';
                      });
                      network.once("stabilizationIterationsDone", function() {
                          document.getElementById('text').innerHTML = '100%';
                          document.getElementById('bar').style.width = '496px';
                          document.getElementById('loadingBar').style.opacity = 0;
                          // really clean the dom element
                          setTimeout(function () {document.getElementById('loadingBar').style.display = 'none';}, 500);
                      });
                  

                  return network;

              }
              drawGraph();
        </script>
    
<script>
document.addEventListener("DOMContentLoaded", function() {
  network.once("stabilized", function() {
    network.setOptions({ physics: { enabled: false } });
  });
  network.on("click", function(params) {
    if (params.nodes.length > 0) {
      var sel   = params.nodes[0];
      var conn  = network.getConnectedNodes(sel);
      var edges_ = network.getConnectedEdges(sel);
      nodes.update(nodes.get().map(function(n) {
        return { id: n.id, opacity: (n.id === sel || conn.indexOf(n.id) !== -1) ? 1.0 : 0.05 };
      }));
      edges.update(edges.get().map(function(e) {
        return { id: e.id, color: { opacity: edges_.indexOf(e.id) !== -1 ? 0.9 : 0.02 } };
      }));
    } else {
      nodes.update(nodes.get().map(function(n) { return { id: n.id, opacity: 1.0 }; }));
      edges.update(edges.get().map(function(e) { return { id: e.id, color: { opacity: null } }; }));
    }
  });
});
</script>
